name: Bug Report
description: Report a bug in discord-ops
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: "discord-ops version (run: npx discord-ops --version)"
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: "Output of: node --version"
