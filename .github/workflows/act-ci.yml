# ============================================================================
# Local CI — Quality gates for nektos/act
# ============================================================================
# Mirrors the core quality gates from ci.yml but avoids GitHub-specific actions
# (actions/setup-node) that break in act due to PATH corruption and missing
# API context.
#
# Usage: ./scripts/act-ci.sh [--job <job-name>] [--list] [--local]
# Jobs: lint, format, type-check, build, test, quality-gates
# ============================================================================

name: Local CI

on:
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint

  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Check formatting
        run: npm run format:check

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Run TypeScript strict check
        run: npm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test

  # -- Aggregate gate ---------------------------------------------------------
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 1
    needs: [lint, format, type-check, build, test]
    if: always()
    steps:
      - name: Check all gates
        run: |
          echo "Lint:       ${{ needs.lint.result }}"
          echo "Format:     ${{ needs.format.result }}"
          echo "Type Check: ${{ needs.type-check.result }}"
          echo "Build:      ${{ needs.build.result }}"
          echo "Test:       ${{ needs.test.result }}"

          FAIL=0
          for gate in lint format type-check build test; do
            case "$gate" in
              lint)       result="${{ needs.lint.result }}" ;;
              format)     result="${{ needs.format.result }}" ;;
              type-check) result="${{ needs.type-check.result }}" ;;
              build)      result="${{ needs.build.result }}" ;;
              test)       result="${{ needs.test.result }}" ;;
            esac
            if [[ "$result" != "success" ]]; then
              echo "FAILED: $gate ($result)"
              FAIL=1
            fi
          done

          if [[ "$FAIL" -eq 1 ]]; then
            echo ""
            echo "One or more quality gates failed"
            exit 1
          fi

          echo ""
          echo "All quality gates passed!"
